services:
  - type: web
    name: uc-smarthelp-frontend
    buildCommand: cd UC-SmartHelp-main && rm -rf node_modules package-lock.json && npm cache clean --force && npm install --production=false --ignore-scripts && npm run build
    startCommand: cd UC-SmartHelp-main && npm run server
    envVars:
      - key: NODE_ENV
        value: production
